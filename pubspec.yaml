name: surpro_ai_music
description: >-
  An AI-powered music app that generates lyrics and songs using machine learning.
  Features AI-assisted music composition and lyric generation capabilities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0 <3.0.0
  image_picker: ^1.0.7 <2.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
